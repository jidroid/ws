<div class="table-wrapper">
  {{ .Page.Store.Set "hasTable" true }}
  <table>
    <thead>
      <tr>
        {{ range .Headers }}
        <th>{{ . }}</th>
        {{ end }}
      </tr>
    </thead>
    <tbody>
      {{ range .Rows }}
      <tr>
        {{ range . }}
        <td>{{ . }}</td>
        {{ end }}
      </tr>
      {{ end }}
    </tbody>
  </table>
</div>
